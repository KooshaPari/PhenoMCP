name: Lint
on: [push, pull_request]

permissions:
  contents: read
jobs:
  golangci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290
        with:
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@8182aa34940a5c3d28dbb24ce802921d8aa7b434
        with:
          version: latest
