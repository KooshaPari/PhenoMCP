name: cargo-machete
on:
  push: { branches: [main], paths: ['Cargo.toml', '**/Cargo.toml'] }
  pull_request: { paths: ['Cargo.toml', '**/Cargo.toml'] }
  schedule: [{ cron: '47 6 * * 4' }]
  workflow_dispatch:
jobs:
  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08
