# cargo-deny configuration
# Conservative defaults: warn on most, deny only known-bad.
# CI integration is intentionally NOT enabled in this commit.

[advisories]
db-path = "$CARGO_HOME/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

# rustls-webpki LOW severity advisories (alpha.7, stable 0.104.0 ETA May-June 2026)
# Re-eval: 2026-06-01
[[advisories.ignore]]
id = "RUSTSEC-2026-0098"
reason = "rustls-webpki name-constraint bypass (LOW). Transitive via rustls. Fix in 0.104.0; current alpha-only (alpha.7 6 days old, May-June stable ETA). Re-evaluate 2026-06-01."

[[advisories.ignore]]
id = "RUSTSEC-2026-0099"
reason = "rustls-webpki wildcard name-constraint bypass (LOW). Same parent + ETA. Re-evaluate 2026-06-01."

[[advisories.ignore]]
id = "RUSTSEC-2026-0104"
reason = "rustls-webpki CRL panic on empty BIT STRING (LOW). Same parent + ETA. Re-evaluate 2026-06-01."

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
